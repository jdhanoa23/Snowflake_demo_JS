version: 2

models:

  - name: obt
    description: "One Big Table: one row per encounter, enriched with all attributes. Feeds the star schema."
    columns:
      - name: encounter_id
        tests:
          - unique
          - not_null

  - name: dim_patients
    description: "Patient dimension."
    columns:
      - name: patient_id
        tests:
          - unique
          - not_null

  - name: dim_providers
    description: "Provider dimension."
    columns:
      - name: provider_id
        tests:
          - unique
          - not_null

  - name: dim_organizations
    description: "Organization dimension."
    columns:
      - name: organization_id
        tests:
          - unique
          - not_null

  - name: dim_payors
    description: "Payor dimension."
    columns:
      - name: payor_id
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Date dimension for time intelligence."
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fact
    description: "Central fact (fct_encounters): one row per encounter with FKs to all dimensions."
    columns:
      - name: encounter_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - relationships:
              to: ref('dim_patients')
              field: patient_id
      - name: provider_id
        tests:
          - relationships:
              to: ref('dim_providers')
              field: provider_id
      - name: organization_id
        tests:
          - relationships:
              to: ref('dim_organizations')
              field: organization_id
      - name: payor_id
        tests:
          - relationships:
              to: ref('dim_payors')
              field: payor_id
